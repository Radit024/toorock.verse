<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/Torock.ico" />

    <!-- Primary SEO -->
    <title>ToRock Verse — Anime, Games, Esports, Movie News and Reviews</title>
    <meta name="description" content="ToRock Verse is your ultimate source for the latest anime, games, esports, films, and pop-culture news. Breaking coverage, reviews, and live scores — all in one place." />
    <meta name="keywords" content="anime news, games news, esports, gaming, culture, film reviews, manga, ToRock Verse, breaking news" />
    <meta name="author" content="ToRock Verse" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://ToRock.verse/" />

    <!-- Open Graph -->
    <meta property="og:title" content="ToRock Verse — Anime, Games, Esports, Movie News and Reviews" />
    <meta property="og:description" content="Your ultimate source for anime, games, esports, films, and pop-culture news. Breaking coverage and live scores." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ToRock.verse/" />
    <meta property="og:site_name" content="ToRock Verse" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ToRockVerse" />
    <meta name="twitter:title" content="ToRock Verse — Anime, Games, Esports, Movie News and Reviews" />
    <meta name="twitter:description" content="Your ultimate source for anime, games, esports, films, and pop-culture news." />

    <!-- Sitemap hint for crawlers -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "ToRock Verse",
      "url": "https://ToRock.verse/",
      "description": "Your ultimate source for anime, games, esports, films, and pop-culture news.",
      "sameAs": [],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://ToRock.verse/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <script>
      (function() {
        var s = localStorage.getItem('text-size') || 'medium';
        document.documentElement.classList.add('text-size-' + s);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
